name: build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install openjdk-25-jdk-headless libgc1 libgc-dev
        sudo apt-get install libelf-dev
        sudo apt-get install linux-tools-`uname -r`
        sudo apt-get install linux-cloud-tools-`uname -r`
        # sudo apt-get install linux-tools-`uname -r`-azure
        # sudo apt-get install bpftool
        which bpftool || echo "no bpftool"
        echo /usr/lib/linux-tools*
        echo /usr/lib/linux-tools/*
        echo /usr/lib/linux-tools*/bpftool
        # sudo apt-get install linux-tools-common
        # which bpftool || echo "no bpftool"
        # echo /usr/lib/linux-tools*
        # echo /usr/lib/linux-tools*/bpftool
        echo /usr/lib/linux-tools/*
        echo /usr/lib/linux-tools/*/bpftool

        # for DTRACE_PROBE
        # sudo apt-get install systemtap-sdt-dev

        echo "JAVA_HOME=/usr/lib/jvm/java-25-openjdk-amd64" >> $GITHUB_ENV
        echo "/usr/lib/jvm/java-25-openjdk-amd64/bin" >> $GITHUB_PATH

    - name: checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: checkout submodules
      run: |
        git submodule init
        git submodule update

    - name: build release
      run: |
        #export BPFTOOL=`echo /usr/lib/linux-tools/*/bpftool | xargs -n 1 echo  | tail -n1`
        #echo BPFTOOL is $BPFTOOL
        make release
